swagger: '2.0'
info:
  description: TheGamesDB REST API - fetch game, platform, genre, developer, publisher, region and country data
  version: 2.0.0
  title: TheGamesDB API
  license:
    name: GNU General Public License v3.0
    url: https://github.com/TheGamesDB/TheGamesDBv2/blob/master/LICENSE

tags:
- name: Games
- name: Platforms
- name: Genres
- name: Developers
- name: Publishers
- name: Regions
- name: Countries
- name: Utility

paths:
  /v1/Games/ByGameID:
    get:
      tags:
      - Games
      operationId: GamesByGameID
      summary: "Fetch game(s) by id"
      description: "Fetch one or more games by their id. Additional data can be requested via `fields` and `include` params."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: id
        description: "(Required) - supports `,` delimited list"
        required: true
        type: string
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `players`, `publishers`, `genres`, `overview`, `last_updated`, `rating`, `platform`, `coop`, `youtube`, `os`, `processor`, `ram`, `hdd`, `video`, `sound`, `alternates`"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - comma-delimited: `boxart`, `platform`"
        required: false
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesByGameID'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 1
                games:
                  - id: 53
                    game_title: "Sonic the Hedgehog"
                    release_date: "1991-06-23"
                    platform: 18
                    players: 1
                    overview: "Join Sonic as he races through six zones to stop the evil Dr. Eggman from enslaving the animal inhabitants of South Island."
                    last_updated: "2022-03-15 10:22:45"
                    rating: "E - Everyone"
                    coop: "No"
                    youtube: "E8VPmADC4aA"
                    developers: [1296]
                    genres: [1]
                    publishers: [1]
              include:
                boxart:
                  base_url:
                    original: "https://cdn.thegamesdb.net/images/original/"
                    small: "https://cdn.thegamesdb.net/images/small/"
                    thumb: "https://cdn.thegamesdb.net/images/thumb/"
                    cropped_center_thumb: "https://cdn.thegamesdb.net/images/cropped_center_thumb/"
                    medium: "https://cdn.thegamesdb.net/images/medium/"
                    large: "https://cdn.thegamesdb.net/images/large/"
                  data:
                    "53":
                      - id: 17438
                        type: "boxart"
                        side: "front"
                        filename: "boxart/front/53-1.jpg"
                        resolution: "1521x2156"
                platform:
                  data:
                    "18":
                      id: 18
                      name: "Sega Genesis"
                      alias: "sega-genesis"
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/ByGameID?apikey=APIKEY&id=53&fields=players%2Cpublishers%2Cgenres%2Coverview%2Clast_updated%2Crating%2Ccoop%2Cyoutube&include=boxart%2Cplatform&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing or invalid id parameter

  /v1/Games/ByGameName:
    get:
      tags:
      - Games
      operationId: GamesByGameName_v1
      summary: "Fetch game(s) by name (v1)"
      description: "Search for games by name. **Note:** in v1 any value passed to the `mode` param triggers natural language search. Use `/v1.1/Games/ByGameName` for correct `mode=natural` handling."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: name
        description: "(Required) - search term"
        required: true
        type: string
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `players`, `publishers`, `genres`, `overview`, `last_updated`, `rating`, `platform`, `coop`, `youtube`, `os`, `processor`, `ram`, `hdd`, `video`, `sound`, `alternates`"
        required: false
        type: string
      - in: query
        name: "filter[platform]"
        description: "(Optional) - filter by platform id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: "filter[region_id]"
        description: "(Optional) - filter by region id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: "filter[country_id]"
        description: "(Optional) - filter by country id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - comma-delimited: `boxart`, `platform`"
        required: false
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesByGameID_v1'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 2
                games:
                  - id: 53
                    game_title: "Sonic the Hedgehog"
                    release_date: "1991-06-23"
                    platform: 18
                  - id: 432
                    game_title: "Sonic the Hedgehog 2"
                    release_date: "1992-11-24"
                    platform: 18
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/ByGameName?apikey=APIKEY&name=Sonic+the+Hedgehog&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing name parameter

  /v1.1/Games/ByGameName:
    get:
      tags:
      - Games
      operationId: GamesByGameName
      summary: "Fetch game(s) by name (v1.1)"
      description: "Search for games by name. Supports optional `mode=natural` for full-text natural language search and `filter` params to narrow results by platform, region, or country. The `include.platform` response wraps data in a `data` key, unlike v1."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: name
        description: "(Required) - search term"
        required: true
        type: string
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `players`, `publishers`, `genres`, `overview`, `last_updated`, `rating`, `platform`, `coop`, `youtube`, `os`, `processor`, `ram`, `hdd`, `video`, `sound`, `alternates`"
        required: false
        type: string
      - in: query
        name: mode
        description: "(Optional) - set to `natural` to use full-text natural language search"
        required: false
        type: string
      - in: query
        name: "filter[platform]"
        description: "(Optional) - filter by platform id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: "filter[region_id]"
        description: "(Optional) - filter by region id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: "filter[country_id]"
        description: "(Optional) - filter by country id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - comma-delimited: `boxart`, `platform`"
        required: false
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesByGameID'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 2
                games:
                  - id: 53
                    game_title: "Sonic the Hedgehog"
                    release_date: "1991-06-23"
                    platform: 18
                  - id: 432
                    game_title: "Sonic the Hedgehog 2"
                    release_date: "1992-11-24"
                    platform: 18
              include:
                boxart:
                  base_url:
                    original: "https://cdn.thegamesdb.net/images/original/"
                    small: "https://cdn.thegamesdb.net/images/small/"
                    thumb: "https://cdn.thegamesdb.net/images/thumb/"
                    cropped_center_thumb: "https://cdn.thegamesdb.net/images/cropped_center_thumb/"
                    medium: "https://cdn.thegamesdb.net/images/medium/"
                    large: "https://cdn.thegamesdb.net/images/large/"
                  data:
                    "53":
                      - id: 17438
                        type: "boxart"
                        side: "front"
                        filename: "boxart/front/53-1.jpg"
                        resolution: "1521x2156"
                platform:
                  data:
                    "18":
                      id: 18
                      name: "Sega Genesis"
                      alias: "sega-genesis"
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1.1/Games/ByGameName?apikey=APIKEY&name=Sonic+the+Hedgehog&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing name parameter

  /v1/Games/ByPlatformID:
    get:
      tags:
      - Games
      operationId: GamesByPlatformID
      summary: "Fetch game(s) by platform id"
      description: "Fetch all games for one or more platforms. Additional data can be requested via `fields` and `include` params."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: id
        description: "(Required) - platform id, supports `,` delimited list"
        required: true
        type: string
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `players`, `publishers`, `genres`, `overview`, `last_updated`, `rating`, `platform`, `coop`, `youtube`, `os`, `processor`, `ram`, `hdd`, `video`, `sound`, `alternates`"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - comma-delimited: `boxart`, `platform`"
        required: false
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesByGameID'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 2
                games:
                  - id: 53
                    game_title: "Sonic the Hedgehog"
                    release_date: "1991-06-23"
                    platform: 18
                  - id: 432
                    game_title: "Sonic the Hedgehog 2"
                    release_date: "1992-11-24"
                    platform: 18
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/ByPlatformID?apikey=APIKEY&id=18&page=1"
                next: "https://api.thegamesdb.net/v1/Games/ByPlatformID?apikey=APIKEY&id=18&page=2"
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing or invalid id parameter

  /v1/Games/ByGameUniqueID:
    get:
      tags:
      - Games
      operationId: GamesByGameUniqueID
      summary: "Fetch game(s) by unique id"
      description: "Search for games by their unique/external identifier (e.g. ROM serial). Can be filtered by platform."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: uid
        description: "(Required) - unique ID string"
        required: true
        type: string
      - in: query
        name: "filter[platform]"
        description: "(Optional) - filter by platform id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `players`, `publishers`, `genres`, `overview`, `last_updated`, `rating`, `platform`, `coop`, `youtube`, `os`, `processor`, `ram`, `hdd`, `video`, `sound`, `alternates`"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - comma-delimited: `boxart`, `platform`"
        required: false
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesByGameID'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 1
                games:
                  - id: 53
                    game_title: "Sonic the Hedgehog"
                    release_date: "1991-06-23"
                    platform: 18
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/ByGameUniqueID?apikey=APIKEY&uid=GM-007037-00&filter%5Bplatform%5D=18&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing uid parameter

  /v1/Games/ByGameHash:
    get:
      tags:
      - Games
      operationId: GamesByGameHash
      summary: "Fetch game(s) by ROM hash"
      description: "Search for games by ROM hash. Can be filtered by platform and hash type."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: hash
        description: "(Required) - hash string"
        required: true
        type: string
      - in: query
        name: "filter[platform]"
        description: "(Optional) - filter by platform id, supports `,` delimited list"
        required: false
        type: string
      - in: query
        name: "filter[type]"
        description: "(Optional) - hash type (e.g. `md5`, `crc`)"
        required: false
        type: string
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `players`, `publishers`, `genres`, `overview`, `last_updated`, `rating`, `platform`, `coop`, `youtube`, `os`, `processor`, `ram`, `hdd`, `video`, `sound`, `alternates`"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - comma-delimited: `boxart`, `platform`"
        required: false
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesByGameID'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 1
                games:
                  - id: 53
                    game_title: "Sonic the Hedgehog"
                    release_date: "1991-06-23"
                    platform: 18
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/ByGameHash?apikey=APIKEY&hash=a29da82b&filter%5Btype%5D=crc&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing hash parameter

  /v1/Games/Images:
    get:
      tags:
      - Games
      operationId: GamesImages
      summary: "Fetch game(s) images by game(s) id"
      description: "Fetch images for one or more games. Results can be filtered by image type."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: games_id
        description: "(Required) - game id, supports `,` delimited list"
        required: true
        type: string
      - in: query
        name: "filter[type]"
        description: "(Optional) - comma-delimited: `fanart`, `banner`, `boxart`, `screenshot`, `clearlogo`, `titlescreen`"
        required: false
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesImages'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 3
                base_url:
                  original: "https://cdn.thegamesdb.net/images/original/"
                  small: "https://cdn.thegamesdb.net/images/small/"
                  thumb: "https://cdn.thegamesdb.net/images/thumb/"
                  cropped_center_thumb: "https://cdn.thegamesdb.net/images/cropped_center_thumb/"
                  medium: "https://cdn.thegamesdb.net/images/medium/"
                  large: "https://cdn.thegamesdb.net/images/large/"
                images:
                  "53":
                    - id: 17438
                      type: "boxart"
                      side: "front"
                      filename: "boxart/front/53-1.jpg"
                      resolution: "1521x2156"
                    - id: 17439
                      type: "boxart"
                      side: "back"
                      filename: "boxart/back/53-1.jpg"
                      resolution: "1521x2156"
                    - id: 4521
                      type: "screenshot"
                      side: null
                      filename: "screenshots/53-1.jpg"
                      resolution: "320x224"
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/Images?apikey=APIKEY&games_id=53&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing or invalid games_id parameter

  /v1/Games/Videos:
    get:
      tags:
      - Games
      operationId: GamesVideos
      summary: "Fetch game(s) videos by game(s) id"
      description: "Fetch videos for one or more games. Results are keyed by game id. Prepend `base_url` to each `filename` to construct the full CDN URL."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: games_id
        description: "(Required) - game id, supports `,` delimited list"
        required: true
        type: string
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesVideos'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 1
                base_url: "https://cdn.thegamesdb.net/"
                videos:
                  "53":
                    - id: 1
                      filename: "videos/53/53-1.mp4"
                      dateadded: "2024-06-01 12:00:00"
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/Videos?apikey=APIKEY&games_id=53&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap
        406:
          description: missing or invalid games_id parameter

  /v1/Games/Updates:
    get:
      tags:
      - Games
      operationId: GamesUpdates
      summary: "Fetch games update log"
      description: "Fetch a log of recent game edits, either from a given `last_edit_id` (preferred, for incremental sync) or within the last N minutes via `time`."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: last_edit_id
        description: "(Optional) - return edits with id greater than this value (use for incremental sync)"
        required: false
        type: integer
      - in: query
        name: time
        description: "(Optional) - return edits from the last N minutes (default: 1440). Used when `last_edit_id` is not provided."
        required: false
        type: integer
      - in: query
        name: page
        description: "(Optional) - results page offset to return"
        required: false
        type: integer
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/GamesUpdates'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 2
                updates:
                  - edit_id: 23159
                    game_id: 60901
                    timestamp: "2024-06-01 14:32:10"
                    type: "boxart"
                    value: "boxart/front/60901-1.jpg"
                  - edit_id: 23160
                    game_id: 53
                    timestamp: "2024-06-01 15:10:45"
                    type: "game_title"
                    value: "Sonic the Hedgehog"
              pages:
                previous: null
                current: "https://api.thegamesdb.net/v1/Games/Updates?apikey=APIKEY&last_edit_id=23158&page=1"
                next: null
        403:
          description: bad API key or hit rate-limit cap

  /v1/Platforms:
    get:
      tags:
      - Platforms
      operationId: Platforms
      summary: "Fetch all platforms"
      description: "Fetch the full list of platforms. Optionally include boxart images via `include=boxart`."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `icon`, `console`, `controller`, `developer`, `manufacturer`, `media`, `cpu`, `memory`, `graphics`, `sound`, `maxcontrollers`, `display`, `overview`, `youtube`"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - set to `boxart` to include platform images"
        required: false
        type: string
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/Platforms'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 2
                platforms:
                  "3":
                    id: 3
                    name: "Nintendo 64"
                    alias: "nintendo-64"
                    developer: "Nintendo"
                  "18":
                    id: 18
                    name: "Sega Genesis"
                    alias: "sega-genesis"
                    developer: "Sega"
        403:
          description: bad API key or hit rate-limit cap

  /v1/Platforms/ByPlatformID:
    get:
      tags:
      - Platforms
      operationId: PlatformsByPlatformID
      summary: "Fetch platform(s) by id"
      description: "Fetch one or more platforms by id. Optionally include boxart images via `include=boxart`."
      produces:
      - application/json
      parameters:
      - in: query
        name: apikey
        description: "(Required)"
        required: true
        type: string
      - in: query
        name: id
        description: "(Required) - supports `,` delimited list"
        required: true
        type: integer
      - in: query
        name: fields
        description: "(Optional) - comma-delimited: `icon`, `console`, `controller`, `developer`, `manufacturer`, `media`, `cpu`, `memory`, `graphics`, `sound`, `maxcontrollers`, `display`, `overview`, `youtube`"
        required: false
        type: string
      - in: query
        name: include
        description: "(Optional) - set to `boxart` to include platform images"
        required: false
        type: string
      responses:
        200:
          description: result
          schema:
            $ref: '#/definitions/PlatformsByPlatformID'
          examples:
            application/json:
              code: 200
              status: "Success"
              remaining_monthly_allowance: 249
              extra_allowance: 0
              allowance_refresh_timer: 2592000
              data:
                count: 1
                platforms:
                  "18":
                    id: 18
                    name: "Sega Genesis"
                    alias: "sega-genesis"
                    overview: "The Sega Genesis, known as the Mega Drive outside North America, is a 16-bit home video game console developed and sold by Sega."
                    developer: "Sega"

  GamesVideos:
    allOf:
    - $ref: '#/definitions/PaginatedApiResponse'
    - type: object
      required:
      - data
      properties:
        data:
          type: object
          required:
          - count
          - base_url
          - videos
          properties:
            count:
              type: integer
              minimum: 0
              description: "Number of games with videos returned"
            base_url:
              type: string
              description: "Prepend to filename to get the full CDN URL"
              example: "https://cdn.thegamesdb.net/"
            videos:
              type: object
              description: "Object keyed by game id, each value is an array of video objects"
              additionalProperties:
                type: array
                items:
                  $ref: '#/definitions/GameVideo'

